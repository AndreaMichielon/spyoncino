name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke test (clean venv, packaged install)
        run: |
          python -m venv /tmp/spyoncino-smoke
          /tmp/spyoncino-smoke/bin/pip install dist/spyoncino-*.whl
          /tmp/spyoncino-smoke/bin/spyoncino --help
          /tmp/spyoncino-smoke/bin/python -c "import spyoncino; print('import ok')"

      - name: Docker image build (CPU)
        run: docker build -t spyoncino:ci-cpu -f Dockerfile .

      - name: Docker image build (GPU)
        run: docker build -t spyoncino:ci-gpu -f Dockerfile.gpu .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images to GHCR
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ github.ref_name }}"
          # CPU (default tags: version + latest)
          docker tag spyoncino:ci-cpu "${IMAGE}:${TAG}"
          docker tag spyoncino:ci-cpu "${IMAGE}:latest"
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          # GPU (explicit tags: version-gpu + latest-gpu)
          docker tag spyoncino:ci-gpu "${IMAGE}:${TAG}-gpu"
          docker tag spyoncino:ci-gpu "${IMAGE}:latest-gpu"
          docker push "${IMAGE}:${TAG}-gpu"
          docker push "${IMAGE}:latest-gpu"
          echo "Pushed ${IMAGE}:${TAG}, ${IMAGE}:latest (CPU) and ${IMAGE}:${TAG}-gpu, ${IMAGE}:latest-gpu (GPU)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
